# Production overrides — use on droplet/VPS:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Frontend is hosted at https://www.medhasync.in (Next.js).
# Optional: run frontend on the droplet with --profile with-frontend

services:
  frontend:
    profiles: ["with-frontend"]

  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes: []

  celery:
    volumes: []

  postgres:
    ports: []

  redis:
    ports: []

  minio:
    ports: []
